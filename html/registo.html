<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css"  href="../css/registo.css" />
    <title>Criar Conta</title>
</head>
    <body>
    <div class="container">
        <form id="form_registo" name="form_registo" method="POST" action="../php/processar_registo.php">
            <h1> Cria a tua conta </h1>
            <div class="input-box">
                <input type="text" name="nome" id="nome" placeholder="Nome" required>
                <img src="../images/user.png" class="icon">
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required id="password-input">
                <img src="../images/ver.png" class="icon" id="btn-password" onclick="mostrarPassword()">
            </div>
            
            <div class="input-box">
                <input type="password" name="confirm_password" placeholder="Confirmar Password" required id="password-inputC">
                <img src="../images/ver.png" class="icon" id="btn-passwordC" onclick="mostrarPasswordC()">
            </div>            

            <div class="input-box">
                <input type="email" name="email" id="email" placeholder="Email">
                <img src="../images/email_w.png" class="icon">
            </div>

            <button type="submit" name="enviar" id="enviar" class="btn-criaconta"> Criar Conta </button>

            <div class="register-link">
                <p> Já tens conta ? <a href="login.html" target="_self"> Login </a></p>
                <br /><p><a href="../index.php" target="_self"> Página Principal </a></p>
            </div>
        </form>
    </div>
    <script src="../js/main.js"></script>
</body>
</html>
