<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css"  href="../css/registo_feito.css" />
    <title>Login</title>
    <link rel="icon" href="images/Favicon.png" sizes="100x100">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #000, #434343);
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.5s ease;
        }
        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            color: #36ff13;
        }
        p {
            color: white;
            font-size: 30px;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            font-size: 40px;
            background: black;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        a:hover {
            background: #36ff13;
            color: rgb(12, 61, 0);
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Sucesso !!<h1>
        <p> O seu registo foi efetuado com sucesso, já pode fazer login. </p>
        <a href="login.html"> Efetuar Login </a>
    </div>
</body>
</html>
